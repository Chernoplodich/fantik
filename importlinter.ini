[importlinter]
root_package = app
include_external_packages = True

[importlinter:contract:layered-architecture]
name = Clean Architecture layers (domain → application → infrastructure/presentation)
type = layers
layers =
    app.presentation
    app.infrastructure
    app.application
    app.domain
    app.core

[importlinter:contract:domain-purity]
name = Domain must not import infrastructure libraries
type = forbidden
source_modules =
    app.domain
forbidden_modules =
    sqlalchemy
    aiogram
    redis
    taskiq
    meilisearch_python_sdk
    aiohttp
    app.infrastructure
    app.presentation

[importlinter:contract:application-purity]
name = Application must not import infrastructure or presentation
type = forbidden
source_modules =
    app.application
forbidden_modules =
    sqlalchemy
    aiogram
    redis
    taskiq
    meilisearch_python_sdk
    aiohttp
    app.infrastructure
    app.presentation
