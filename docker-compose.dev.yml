services:
  bot:
    volumes:
      - ./src:/app/src:cached
      - ./migrations:/app/migrations:cached
      - ./alembic.ini:/app/alembic.ini:cached
    environment:
      LOG_LEVEL: DEBUG
      LOG_RENDERER: console
      POSTGRES_ECHO: "false"
    ports:
      - "8080:8080"
      - "8081:8081"

  worker:
    volumes:
      - ./src:/app/src:cached
      - ./migrations:/app/migrations:cached
      - ./alembic.ini:/app/alembic.ini:cached
    environment:
      LOG_LEVEL: DEBUG
    # В dev пробрасываем /metrics на хост, чтобы smoke.sh и Grafana
    # (при проверке вручную без observability-профиля) могли дёрнуть.
    ports:
      - "8082:8082"

  worker-broadcast:
    volumes:
      - ./src:/app/src:cached
      - ./migrations:/app/migrations:cached
      - ./alembic.ini:/app/alembic.ini:cached
    ports:
      - "8083:8083"

  scheduler:
    volumes:
      - ./src:/app/src:cached
      - ./migrations:/app/migrations:cached
      - ./alembic.ini:/app/alembic.ini:cached
    ports:
      - "8084:8084"

  migrate:
    volumes:
      - ./src:/app/src:cached
      - ./migrations:/app/migrations:cached
      - ./alembic.ini:/app/alembic.ini:cached

  # Нестандартные порты, чтобы не конфликтовать с локально запущенными сервисами.
  # Подключение с хоста: psql -h localhost -p 55432, redis-cli -p 56379, curl localhost:57700.
  # Внутри compose-сети сервисы всё равно обращаются по стандартным портам (postgres:5432 и т.д.).
  postgres:
    ports:
      - "55432:5432"

  redis:
    ports:
      - "56379:6379"

  meilisearch:
    ports:
      - "57700:7700"
