global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "fantik-bot"
    static_configs:
      # /metrics у бота висит на том же aiohttp, что /healthz — 8080.
      - targets: ["bot:8080"]
        labels: { component: "bot" }

  - job_name: "fantik-worker"
    static_configs:
      - targets: ["worker:8082"]
        labels: { component: "worker" }

  - job_name: "fantik-worker-broadcast"
    static_configs:
      - targets: ["worker-broadcast:8083"]
        labels: { component: "worker-broadcast" }

  - job_name: "fantik-scheduler"
    static_configs:
      - targets: ["scheduler:8084"]
        labels: { component: "scheduler" }
